services:
  - type: web
    name: ieee-unipiloto
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn semillero_IOT.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
