<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semillero IOT - Portafolio & Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --rojo-lab: #dc3545;
            --azul-tech: #0d6efd;
            --negro-deep: #212529;
            --gris-suave: #f8f9fa;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blanco);
            color: var(--negro-deep);
        }

        /* Navbar estilo institucional */
        .navbar {
            background-color: var(--negro-deep) !important;
            border-bottom: 4px solid var(--azul-tech);
        }
        .navbar-brand { font-weight: bold; color: var(--blanco) !important; }
        .nav-link { color: rgba(255,255,255,0.8) !important; }
        .nav-link:hover { color: var(--rojo-lab) !important; }

        footer {
            background-color: var(--negro-deep);
            color: var(--blanco);
            padding: 30px 0;
            margin-top: 50px;
            border-top: 5px solid var(--rojo-lab);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">SEMILLERO IOT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#institucional">Institucional</a>
                    <li class="nav-item"><a class="nav-link" href="#laboratorio">Laboratorio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#blog">Blog</a></li>
                    <li class="nav-item"><a class="nav-link text-info" href="#contacto">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center">
        <div class="container">
            <p>&copy; 2026 Semillero IOT - Universidad Piloto de Colombia</p>
            <small>Diseñado para Investigación y Desarrollo</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
